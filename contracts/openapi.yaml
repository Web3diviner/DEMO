openapi: 3.1.0
info:
  title: DEMO API
  version: 0.1.0
  description: >
    Contract-first source of truth for the DEMO client. The frontend's typed client and Zod
    validators in `lib/api` mirror these schemas 1:1; once a backend publishes this spec, the
    TypeScript types are generated from it in CI. Money is always integer minor units. Video never
    transits this API — uploads use signed tus tickets, playback uses signed expiring HLS URLs.
servers:
  - url: https://api.demo.example
paths:
  /v1/feed:
    get:
      summary: Personalized talent feed (cursor-paginated). For You vs Following (PRD §6.1)
      parameters:
        - name: cursor
          in: query
          required: false
          schema: { type: string, nullable: true }
        - name: feed
          in: query
          required: false
          schema: { type: string, enum: [fyp, following], default: fyp }
      responses:
        "200":
          description: A page of clips
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeedPage" }
  /v1/engagement:
    post:
      summary: Commit a single engagement action (like/follow/comment)
      description: Idempotent via the Idempotency-Key header; safe to retry from the offline queue.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EngagementAction" }
      responses:
        "200":
          description: Server-confirmed engagement result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EngagementResult" }
  /v1/uploads/ticket:
    post:
      summary: Issue a short-lived signed tus ticket for direct-to-storage video upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sizeBytes, mimeType]
              properties:
                sizeBytes: { type: integer }
                mimeType: { type: string }
      responses:
        "200":
          description: Signed upload ticket
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadTicket" }
  /v1/clips:
    post:
      summary: Publish clip metadata + claim an uploaded asset
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assetId, caption]
              properties:
                assetId: { type: string }
                caption: { type: string }
      responses:
        "200":
          description: Publish accepted (asset transcoding to HLS)
          content:
            application/json:
              schema:
                type: object
                required: [clipId, status]
                properties:
                  clipId: { type: string }
                  status: { type: string, enum: [processing, published] }
  /v1/clips/mine:
    get:
      summary: The signed-in creator's own clips (content management)
      responses:
        "200":
          description: The creator's clips
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MyClip" }
  /v1/clips/{id}:
    patch:
      summary: Edit a clip's caption
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [caption]
              properties:
                caption: { type: string }
      responses:
        "200":
          description: The updated clip
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MyClip" }
    delete:
      summary: Delete a clip (idempotent)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties: { ok: { type: boolean } }
  /v1/profiles/{handle}:
    get:
      summary: Creator profile / Talent Hub
      parameters:
        - name: handle
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
  /v1/me:
    get:
      summary: The signed-in user's own editable profile
      responses:
        "200":
          description: Me
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
    patch:
      summary: Update editable profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [displayName, bio, campus]
              properties:
                displayName: { type: string }
                bio: { type: string }
                campus: { type: string, nullable: true }
      responses:
        "200":
          description: The saved profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
  /v1/wallet:
    get:
      summary: Fan Credits + creator earnings (server-truth balances)
      responses:
        "200":
          description: Wallet balances
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Wallet" }
  /v1/earnings:
    get:
      summary: Creator earnings — balances, payout method, and recent ledger entries
      responses:
        "200":
          description: Earnings summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EarningsSummary" }
  /v1/earnings/withdraw:
    post:
      summary: Request a withdrawal of the creator's available balance (server-truth)
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountMinor]
              properties:
                amountMinor:
                  type: integer
                  description: Amount in NGN kobo; must not exceed the available balance.
      responses:
        "200":
          description: Withdrawal accepted for processing, with the updated summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WithdrawalResult" }
  /v1/banks:
    get:
      summary: Banks available for payout
      responses:
        "200":
          description: Bank list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Bank" }
  /v1/earnings/payout-method/resolve:
    get:
      summary: Resolve the account holder's name for a bank + account number
      parameters:
        - { name: bankCode, in: query, required: true, schema: { type: string } }
        - { name: accountNumber, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: Resolved account holder
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResolvedAccount" }
  /v1/earnings/payout-method:
    post:
      summary: Link a bank account as the creator's payout method
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bankCode, accountNumber]
              properties:
                bankCode: { type: string }
                accountNumber: { type: string, description: "10-digit NUBAN" }
      responses:
        "200":
          description: Updated earnings summary (account stored masked)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EarningsSummary" }
  /v1/credits/packs:
    get:
      summary: Purchasable Credit packs (server-quoted prices)
      responses:
        "200":
          description: Packs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CreditPack" }
  /v1/credits/topup:
    post:
      summary: Create a top-up intent; returns a Paystack reference for the inline popup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [packId]
              properties:
                packId: { type: string }
      responses:
        "200":
          description: Top-up intent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TopUpIntent" }
  /v1/credits/topup/{reference}:
    get:
      summary: Top-up status — `success` is set from the Paystack WEBHOOK, never the client
      parameters:
        - name: reference
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Status (poll until non-pending)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TopUpStatus" }
  /v1/clips/{clipId}/comments:
    get:
      summary: Comments for a clip (cursor-paginated)
      parameters:
        - name: clipId
          in: path
          required: true
          schema: { type: string }
        - name: cursor
          in: query
          required: false
          schema: { type: string, nullable: true }
      responses:
        "200":
          description: A page of comments
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommentPage" }
  /v1/battles:
    get:
      summary: Battles, optionally filtered by state (PRD §6.5)
      parameters:
        - name: state
          in: query
          required: false
          schema: { type: string, enum: [draft, open, voting, settled, archived] }
      responses:
        "200":
          description: Battles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Battle" }
  /v1/battles/{id}:
    get:
      summary: A single battle
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Battle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Battle" }
  /v1/battles/{id}/vote:
    post:
      summary: Cast one Credit-funded, weight-adjusted vote (vote cost → escrow + platform fee)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contestantId]
              properties:
                contestantId: { type: string }
      responses:
        "200":
          description: Updated battle + server-truth wallet after the spend
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VoteResult" }
  /v1/clips/{clipId}/tip:
    post:
      summary: One-tap tip (PRD §6.1/§7.2) — Credits → platform fee + creator earnings
      parameters:
        - name: clipId
          in: path
          required: true
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credits]
              properties:
                credits: { type: integer, description: Credits to send }
      responses:
        "200":
          description: Confirmed wallet after the spend
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TipResult" }
  /v1/search:
    get:
      summary: Search creators, hashtags, and clips (PRD §6.1)
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Grouped results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchResult" }
  /v1/trends:
    get:
      summary: Trending hashtags
      responses:
        "200":
          description: Trending hashtags
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Hashtag" }
  /v1/push/subscribe:
    post:
      summary: Register a Web Push subscription for the signed-in user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscription]
              properties:
                subscription: { type: object, description: PushSubscription JSON (endpoint + keys) }
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties: { ok: { type: boolean } }
  /v1/push/unsubscribe:
    post:
      summary: Remove a Web Push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint]
              properties:
                endpoint: { type: string }
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties: { ok: { type: boolean } }
  /v1/ambassador:
    get:
      summary: Ambassador dashboard (PRD §6.10) — referral tools + gamified rewards
      responses:
        "200":
          description: Ambassador state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ambassador" }
  /v1/events:
    get:
      summary: Upcoming events (PRD §6.8), optionally by type
      parameters:
        - name: type
          in: query
          required: false
          schema: { type: string, enum: [show, concert, competition, awards, festival] }
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Event" }
  /v1/events/{id}:
    get:
      summary: Event detail (description + lineup)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Event detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EventDetail" }
  /v1/events/{id}/tickets:
    post:
      summary: Reserve a ticket (Credits spend if priced; free events RSVP)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Ticket + server-truth wallet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TicketResult" }
  /v1/tickets:
    get:
      summary: The signed-in user's ticket wallet (passes)
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Ticket" }
  /v1/creators/{handle}/fanclub:
    get:
      summary: A creator's Fan Club — tiers, membership state, locked preview (PRD §6.6)
      parameters:
        - { name: handle, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Fan Club
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FanClub" }
  /v1/fanclub/subscribe:
    post:
      summary: Start a recurring subscription; returns a Paystack reference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [creatorHandle, tierId]
              properties:
                creatorHandle: { type: string }
                tierId: { type: string }
      responses:
        "200":
          description: Subscribe intent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubscribeIntent" }
  /v1/fanclub/subscribe/{reference}:
    get:
      summary: Subscription status — `active` set from the Paystack webhook (off-chain truth)
      parameters:
        - { name: reference, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Status (poll until non-pending)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubscriptionStatus" }
  /v1/memberships:
    get:
      summary: The signed-in user's Fan Club memberships
      responses:
        "200":
          description: Memberships
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Membership" }
  /v1/memberships/{id}/cancel:
    post:
      summary: Cancel a membership (access lasts until the period ends)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Updated membership
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Membership" }
  /v1/market/listings:
    get:
      summary: Marketplace listings (PRD §6.7), optionally by category
      parameters:
        - name: category
          in: query
          required: false
          schema: { type: string, enum: [beat, song, ticket, merch, service] }
      responses:
        "200":
          description: Listings
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MarketListing" }
  /v1/market/listings/{id}:
    get:
      summary: A single listing with full detail
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Listing detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketListingDetail" }
  /v1/market/orders:
    post:
      summary: Buy a listing (Credits spend → escrow + commission in the ledger)
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listingId]
              properties:
                listingId: { type: string }
                shipping:
                  type: object
                  description: Required for physical goods (fulfilment metadata)
                  properties:
                    name: { type: string }
                    address: { type: string }
                    phone: { type: string }
      responses:
        "200":
          description: Order (digital delivers immediately; physical is processing)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketOrder" }
  /v1/scout/talents:
    get:
      summary: Talent Intelligence search/filter (PRD §6.9) — enterprise RBAC
      parameters:
        - { name: q, in: query, required: false, schema: { type: string } }
        - { name: campus, in: query, required: false, schema: { type: string } }
        - { name: genre, in: query, required: false, schema: { type: string } }
        - { name: minOverall, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Matching talents (explainable composite scores)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ScoutTalent" }
  /v1/scout/talents/{handle}:
    get:
      summary: Explainable talent detail (score breakdown + trend)
      parameters:
        - { name: handle, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Talent detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScoutTalentDetail" }
  /v1/moderation/queue:
    get:
      summary: Staff review queue (PRD §10.3) — automated flags + user reports
      responses:
        "200":
          description: Items awaiting review
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ModerationItem" }
  /v1/moderation/{id}/action:
    post:
      summary: Resolve a queue item (logged + re-checked server-side)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [approve, remove, ban, escalate] }
      responses:
        "200":
          description: Resolution
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: { type: string }
                  status: { type: string, enum: [approved, removed, banned, escalated] }
  /v1/dms:
    get:
      summary: Direct-message threads for the signed-in user (PRD §11)
      responses:
        "200":
          description: Threads
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DmThread" }
  /v1/dms/{id}:
    get:
      summary: A single thread with its messages
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Thread detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DmThreadDetail" }
  /v1/dms/{id}/messages:
    post:
      summary: Send a message in a thread (idempotent via localId)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body, localId]
              properties:
                body: { type: string }
                localId: { type: string }
      responses:
        "200":
          description: The created message
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DmMessage" }
  /v1/notifications:
    get:
      summary: The signed-in user's activity inbox (in-app companion to web-push)
      responses:
        "200":
          description: Notifications with the current unread count
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationsPage" }
  /v1/notifications/preferences:
    get:
      summary: Per-category push preferences
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationPrefs" }
    patch:
      summary: Toggle a single notification category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, value]
              properties:
                key:
                  type: string
                  enum: [tips, battles, follows, comments, messages]
                value: { type: boolean }
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationPrefs" }
  /v1/notifications/read:
    post:
      summary: Mark all notifications read (idempotent)
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The cleared inbox (unread = 0)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationsPage" }
  /v1/notifications/{id}/read:
    post:
      summary: Mark a single notification read (idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The inbox with the item read and unread recomputed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationsPage" }
  /v1/charts/{board}:
    get:
      summary: Leaderboard for a board (PRD §6.4); Rising ranks growth velocity
      parameters:
        - name: board
          in: path
          required: true
          schema: { type: string, enum: [campus, state, national, genre, rising] }
        - name: scope
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Chart
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Chart" }
  /v1/analytics:
    get:
      summary: A creator's performance dashboard for the selected range (server-computed)
      parameters:
        - name: range
          in: query
          required: false
          schema: { type: string, enum: ["7d", "28d", "90d"], default: "7d" }
      responses:
        "200":
          description: Creator analytics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreatorAnalytics" }
  /v1/analytics/clips/{clipId}:
    get:
      summary: Per-clip analytics — retention curve, engagement, and traffic sources
      parameters:
        - name: clipId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Clip analytics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClipAnalytics" }
components:
  schemas:
    Money:
      type: object
      required: [currency, minor]
      properties:
        currency: { type: string, enum: [CREDITS, NGN, USD] }
        minor: { type: integer, description: Amount in minor units (kobo/cents/whole Credits) }
    Creator:
      type: object
      required: [id, handle, displayName, avatarUrl, verified, campus]
      properties:
        id: { type: string }
        handle: { type: string }
        displayName: { type: string }
        avatarUrl: { type: string, format: uri, nullable: true }
        verified: { type: boolean, description: Server-truth verification entitlement }
        campus: { type: string, nullable: true }
    Clip:
      type: object
      required:
        [
          id,
          creator,
          caption,
          hlsUrl,
          posterUrl,
          durationSec,
          width,
          height,
          stats,
          viewer,
          battleId,
        ]
      properties:
        id: { type: string }
        creator: { $ref: "#/components/schemas/Creator" }
        caption: { type: string }
        hlsUrl: { type: string, format: uri, description: Signed, expiring master HLS playlist }
        posterUrl: { type: string, format: uri }
        durationSec: { type: number }
        width: { type: integer }
        height: { type: integer }
        stats:
          type: object
          required: [likes, comments, shares, plays]
          properties:
            likes: { type: integer }
            comments: { type: integer }
            shares: { type: integer }
            plays: { type: integer }
        viewer:
          type: object
          required: [liked, following]
          properties:
            liked: { type: boolean }
            following: { type: boolean }
        battleId: { type: string, nullable: true }
    FeedPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Clip" }
        nextCursor: { type: string, nullable: true }
    EngagementAction:
      oneOf:
        - type: object
          required: [kind, clipId, value]
          properties:
            kind: { type: string, enum: [like] }
            clipId: { type: string }
            value: { type: boolean }
        - type: object
          required: [kind, creatorId, value]
          properties:
            kind: { type: string, enum: [follow] }
            creatorId: { type: string }
            value: { type: boolean }
        - type: object
          required: [kind, clipId, body, localId]
          properties:
            kind: { type: string, enum: [comment] }
            clipId: { type: string }
            body: { type: string }
            localId: { type: string }
    EngagementResult:
      type: object
      required: [clipId, liked, likeCount]
      properties:
        clipId: { type: string }
        liked: { type: boolean }
        likeCount: { type: integer }
    UploadTicket:
      type: object
      required: [endpoint, assetId, headers, expiresAt]
      properties:
        endpoint:
          { type: string, format: uri, description: tus creation endpoint at the storage provider }
        assetId: { type: string }
        headers:
          type: object
          additionalProperties: { type: string }
        expiresAt: { type: string, format: date-time }
    Wallet:
      type: object
      required: [credits, earnings]
      properties:
        credits: { $ref: "#/components/schemas/Money" }
        earnings: { $ref: "#/components/schemas/Money" }
    PayoutMethod:
      type: object
      required: [bank, accountMask]
      properties:
        bank: { type: string }
        accountMask: { type: string, description: "Masked account, e.g. ••••1234" }
    EarningEntry:
      type: object
      required: [id, source, label, amount, createdAt, status]
      properties:
        id: { type: string }
        source:
          type: string
          enum: [tip, battle, fanclub, market, bonus, withdrawal]
        label: { type: string }
        amount: { $ref: "#/components/schemas/Money" }
        createdAt: { type: string, format: date-time }
        status: { type: string, enum: [settled, pending] }
    EarningsSummary:
      type: object
      required: [available, pending, lifetime, payoutMethod, entries]
      properties:
        available: { $ref: "#/components/schemas/Money" }
        pending: { $ref: "#/components/schemas/Money" }
        lifetime: { $ref: "#/components/schemas/Money" }
        payoutMethod:
          nullable: true
          allOf: [{ $ref: "#/components/schemas/PayoutMethod" }]
        entries:
          type: array
          items: { $ref: "#/components/schemas/EarningEntry" }
    WithdrawalResult:
      type: object
      required: [reference, status, summary]
      properties:
        reference: { type: string }
        status: { type: string, enum: [processing, failed] }
        summary: { $ref: "#/components/schemas/EarningsSummary" }
    Bank:
      type: object
      required: [code, name]
      properties:
        code: { type: string }
        name: { type: string }
    ResolvedAccount:
      type: object
      required: [accountName]
      properties:
        accountName: { type: string }
    BattleContestant:
      type: object
      required: [id, creator, posterUrl, votes]
      properties:
        id: { type: string }
        creator: { $ref: "#/components/schemas/Creator" }
        posterUrl: { type: string, format: uri }
        votes: { type: integer, description: Weighted vote tally }
    Battle:
      type: object
      required:
        [
          id,
          format,
          title,
          state,
          endsAt,
          voteCost,
          prizePool,
          contestants,
          winnerContestantId,
          viewer,
        ]
      properties:
        id: { type: string }
        format: { type: string, enum: [rap, gospel, beat, choir, songwriting] }
        title: { type: string }
        state: { type: string, enum: [draft, open, voting, settled, archived] }
        endsAt: { type: string, format: date-time, nullable: true }
        voteCost: { $ref: "#/components/schemas/Money" }
        prizePool: { $ref: "#/components/schemas/Money" }
        contestants:
          type: array
          items: { $ref: "#/components/schemas/BattleContestant" }
        winnerContestantId: { type: string, nullable: true }
        viewer:
          type: object
          required: [votedContestantId, voteWeight]
          properties:
            votedContestantId: { type: string, nullable: true }
            voteWeight: { type: integer }
    VoteResult:
      type: object
      required: [battle, wallet]
      properties:
        battle: { $ref: "#/components/schemas/Battle" }
        wallet: { $ref: "#/components/schemas/Wallet" }
    TipResult:
      type: object
      required: [clipId, creditsSpent, wallet]
      properties:
        clipId: { type: string }
        creditsSpent: { $ref: "#/components/schemas/Money" }
        wallet: { $ref: "#/components/schemas/Wallet" }
    DmParticipant:
      type: object
      required: [handle, displayName, verified, avatarUrl]
      properties:
        handle: { type: string }
        displayName: { type: string }
        verified: { type: boolean }
        avatarUrl: { type: string, format: uri, nullable: true }
    DmMessage:
      type: object
      required: [id, fromMe, body, createdAt]
      properties:
        id: { type: string }
        fromMe: { type: boolean }
        body: { type: string }
        createdAt: { type: string, format: date-time }
    DmThread:
      type: object
      required: [id, participant, lastMessage, lastAt, unread]
      properties:
        id: { type: string }
        participant: { $ref: "#/components/schemas/DmParticipant" }
        lastMessage: { type: string }
        lastAt: { type: string, format: date-time }
        unread: { type: integer }
    DmThreadDetail:
      type: object
      required: [id, participant, messages]
      properties:
        id: { type: string }
        participant: { $ref: "#/components/schemas/DmParticipant" }
        messages:
          type: array
          items: { $ref: "#/components/schemas/DmMessage" }
    Notification:
      type: object
      required: [id, kind, text, createdAt, read, actor, href]
      properties:
        id: { type: string }
        kind:
          type: string
          enum: [follow, like, comment, tip, battle, earning, system]
        text: { type: string }
        createdAt: { type: string, format: date-time }
        read: { type: boolean }
        actor:
          nullable: true
          allOf: [{ $ref: "#/components/schemas/DmParticipant" }]
        href: { type: string, nullable: true }
    NotificationsPage:
      type: object
      required: [items, unread]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Notification" }
        unread: { type: integer }
    NotificationPrefs:
      type: object
      required: [tips, battles, follows, comments, messages]
      properties:
        tips: { type: boolean }
        battles: { type: boolean }
        follows: { type: boolean }
        comments: { type: boolean }
        messages: { type: boolean }
    Hashtag:
      type: object
      required: [tag, posts]
      properties:
        tag: { type: string }
        posts: { type: integer }
    Ambassador:
      type: object
      required: [code, referralUrl, stats, tier, leaderboard]
      properties:
        code: { type: string }
        referralUrl: { type: string, format: uri }
        stats:
          type: object
          required: [invited, joined, activated, rewards]
          properties:
            invited: { type: integer }
            joined: { type: integer }
            activated: { type: integer, description: Verified + active referrals (what pays out) }
            rewards: { $ref: "#/components/schemas/Money" }
        tier:
          type: object
          required: [name, activated, nextAt, nextReward]
          properties:
            name: { type: string }
            activated: { type: integer }
            nextAt: { type: integer }
            nextReward: { $ref: "#/components/schemas/Money" }
        leaderboard:
          type: array
          items:
            type: object
            required: [rank, handle, displayName, activations, you]
            properties:
              rank: { type: integer }
              handle: { type: string }
              displayName: { type: string }
              activations: { type: integer }
              you: { type: boolean }
    SearchResult:
      type: object
      required: [creators, hashtags, clips]
      properties:
        creators:
          type: array
          items: { $ref: "#/components/schemas/Creator" }
        hashtags:
          type: array
          items: { $ref: "#/components/schemas/Hashtag" }
        clips:
          type: array
          items:
            type: object
            required: [id, posterUrl, plays]
            properties:
              id: { type: string }
              posterUrl: { type: string, format: uri }
              plays: { type: integer }
    Event:
      type: object
      required: [id, title, type, coverUrl, startsAt, venue, campus, attendees, price, viewer]
      properties:
        id: { type: string }
        title: { type: string }
        type: { type: string, enum: [show, concert, competition, awards, festival] }
        coverUrl: { type: string, format: uri }
        startsAt: { type: string, format: date-time }
        venue: { type: string }
        campus: { type: string }
        attendees: { type: integer }
        price: { $ref: "#/components/schemas/Money" }
        viewer:
          type: object
          required: [hasTicket]
          properties: { hasTicket: { type: boolean } }
    EventDetail:
      allOf:
        - { $ref: "#/components/schemas/Event" }
        - type: object
          required: [description, lineup]
          properties:
            description: { type: string }
            lineup:
              type: array
              items:
                type: object
                required: [handle, displayName, verified]
                properties:
                  handle: { type: string }
                  displayName: { type: string }
                  verified: { type: boolean }
    Ticket:
      type: object
      required: [id, eventId, title, startsAt, venue, code, status]
      properties:
        id: { type: string }
        eventId: { type: string }
        title: { type: string }
        startsAt: { type: string, format: date-time }
        venue: { type: string }
        code: { type: string }
        status: { type: string, enum: [valid, used] }
    TicketResult:
      type: object
      required: [ticket, wallet]
      properties:
        ticket: { $ref: "#/components/schemas/Ticket" }
        wallet: { $ref: "#/components/schemas/Wallet" }
    FanClubTier:
      type: object
      required: [id, name, price, perks, badge]
      properties:
        id: { type: string }
        name: { type: string }
        price: { $ref: "#/components/schemas/Money" }
        perks: { type: array, items: { type: string } }
        badge: { type: string }
    FanClub:
      type: object
      required: [creator, tiers, viewer, lockedPreview]
      properties:
        creator:
          type: object
          required: [handle, displayName, verified]
          properties:
            handle: { type: string }
            displayName: { type: string }
            verified: { type: boolean }
        tiers: { type: array, items: { $ref: "#/components/schemas/FanClubTier" } }
        viewer:
          type: object
          required: [tierId, status, expiresAt]
          properties:
            tierId: { type: string, nullable: true }
            status: { type: string, enum: [none, active, expired] }
            expiresAt: { type: string, format: date-time, nullable: true }
        lockedPreview:
          type: array
          items:
            type: object
            required: [id, title]
            properties:
              id: { type: string }
              title: { type: string }
    Membership:
      type: object
      required: [id, creatorHandle, displayName, tierName, status, renewsAt, expiresAt]
      properties:
        id: { type: string }
        creatorHandle: { type: string }
        displayName: { type: string }
        tierName: { type: string }
        status: { type: string, enum: [active, expired, cancelled] }
        renewsAt: { type: string, format: date-time, nullable: true }
        expiresAt: { type: string, format: date-time }
    SubscribeIntent:
      type: object
      required: [reference, accessCode, price]
      properties:
        reference: { type: string }
        accessCode: { type: string }
        price: { $ref: "#/components/schemas/Money" }
    SubscriptionStatus:
      type: object
      required: [reference, status, membership]
      properties:
        reference: { type: string }
        status: { type: string, enum: [pending, active, failed] }
        membership:
          oneOf:
            - { $ref: "#/components/schemas/Membership" }
            - { type: "null" }
    MarketListing:
      type: object
      required: [id, title, category, kind, price, creator, coverUrl, blurb, soldCount]
      properties:
        id: { type: string }
        title: { type: string }
        category: { type: string, enum: [beat, song, ticket, merch, service] }
        kind: { type: string, enum: [digital, physical] }
        price: { $ref: "#/components/schemas/Money" }
        creator:
          type: object
          required: [handle, displayName, verified]
          properties:
            handle: { type: string }
            displayName: { type: string }
            verified: { type: boolean }
        coverUrl: { type: string, format: uri }
        blurb: { type: string }
        soldCount: { type: integer }
    MarketListingDetail:
      allOf:
        - { $ref: "#/components/schemas/MarketListing" }
        - type: object
          required: [description, deliverableNote]
          properties:
            description: { type: string }
            deliverableNote: { type: string }
    MarketOrder:
      type: object
      required: [id, listingId, title, status, kind, deliverable, wallet]
      properties:
        id: { type: string }
        listingId: { type: string }
        title: { type: string }
        status: { type: string, enum: [delivered, processing] }
        kind: { type: string, enum: [digital, physical] }
        deliverable:
          oneOf:
            - type: object
              required: [type, note]
              properties:
                type: { type: string, enum: [download, unlock, ticket] }
                note: { type: string }
            - type: "null"
        wallet: { $ref: "#/components/schemas/Wallet" }
    TalentScores:
      type: object
      required: [growth, virality, loyalty, campusInfluence, readiness]
      properties:
        growth: { type: number }
        virality: { type: number }
        loyalty: { type: number }
        campusInfluence: { type: number }
        readiness: { type: number }
    ScoutTalent:
      type: object
      required: [id, handle, displayName, campus, genre, verified, followers, scores, overall]
      properties:
        id: { type: string }
        handle: { type: string }
        displayName: { type: string }
        campus: { type: string }
        genre: { type: string }
        verified: { type: boolean }
        followers: { type: integer }
        scores: { $ref: "#/components/schemas/TalentScores" }
        overall: { type: number }
    ScoutTalentDetail:
      allOf:
        - { $ref: "#/components/schemas/ScoutTalent" }
        - type: object
          required: [factors, trend]
          properties:
            factors:
              type: array
              items:
                type: object
                required: [label, detail]
                properties:
                  label: { type: string }
                  detail: { type: string }
            trend:
              type: array
              items: { type: number }
    ModerationItem:
      type: object
      required:
        [id, kind, source, reason, severity, confidence, subject, preview, reportCount, createdAt]
      properties:
        id: { type: string }
        kind: { type: string, enum: [clip, comment, user] }
        source: { type: string, enum: [ai, report] }
        reason: { type: string }
        severity: { type: string, enum: [low, medium, high] }
        confidence: { type: number, nullable: true, description: AI confidence 0..1 }
        subject:
          type: object
          required: [handle, displayName]
          properties:
            handle: { type: string }
            displayName: { type: string }
        preview:
          type: object
          required: [posterUrl, text]
          properties:
            posterUrl: { type: string, format: uri, nullable: true }
            text: { type: string, nullable: true }
        reportCount: { type: integer }
        createdAt: { type: string, format: date-time }
    ChartEntry:
      type: object
      required: [rank, delta, creator, score, risingPct]
      properties:
        rank: { type: integer }
        delta: { type: integer, description: Rank change since last rollup }
        creator: { $ref: "#/components/schemas/Creator" }
        score: { type: number }
        risingPct: { type: number, nullable: true }
    Chart:
      type: object
      required: [board, scope, periodLabel, entries]
      properties:
        board: { type: string, enum: [campus, state, national, genre, rising] }
        scope: { type: string, nullable: true }
        periodLabel: { type: string }
        entries:
          type: array
          items: { $ref: "#/components/schemas/ChartEntry" }
    CountMetric:
      type: object
      required: [value, delta]
      properties:
        value: { type: number }
        delta: { type: number, description: "% change vs the previous period" }
    EarningMetric:
      type: object
      required: [value, delta]
      properties:
        value: { $ref: "#/components/schemas/Money" }
        delta: { type: number }
    AnalyticsPoint:
      type: object
      required: [date, views]
      properties:
        date: { type: string, format: date-time }
        views: { type: integer }
    AnalyticsClip:
      type: object
      required: [id, caption, views, likes]
      properties:
        id: { type: string }
        caption: { type: string }
        views: { type: integer }
        likes: { type: integer }
    AudienceCampus:
      type: object
      required: [name, share]
      properties:
        name: { type: string }
        share: { type: number, description: "0..1 share of audience" }
    CreatorAnalytics:
      type: object
      required: [range, metrics, series, topClips, topCampuses]
      properties:
        range: { type: string, enum: ["7d", "28d", "90d"] }
        metrics:
          type: object
          required: [views, watchTimeHours, followers, earnings]
          properties:
            views: { $ref: "#/components/schemas/CountMetric" }
            watchTimeHours: { $ref: "#/components/schemas/CountMetric" }
            followers: { $ref: "#/components/schemas/CountMetric" }
            earnings: { $ref: "#/components/schemas/EarningMetric" }
        series:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsPoint" }
        topClips:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsClip" }
        topCampuses:
          type: array
          items: { $ref: "#/components/schemas/AudienceCampus" }
    RetentionPoint:
      type: object
      required: [pct, value]
      properties:
        pct: { type: number, description: "0..100 position through the clip" }
        value: { type: number, description: "0..1 share still watching" }
    ClipTraffic:
      type: object
      required: [source, share]
      properties:
        source: { type: string, enum: [fyp, following, profile, search, share] }
        share: { type: number, description: "0..1" }
    ClipAnalytics:
      type: object
      required:
        [clip, views, likes, comments, shares, avgWatchPct, completionRate, retention, sources]
      properties:
        clip:
          type: object
          required: [id, caption]
          properties:
            id: { type: string }
            caption: { type: string }
        views: { type: integer }
        likes: { type: integer }
        comments: { type: integer }
        shares: { type: integer }
        avgWatchPct: { type: number, description: "0..1" }
        completionRate: { type: number, description: "0..1" }
        retention:
          type: array
          items: { $ref: "#/components/schemas/RetentionPoint" }
        sources:
          type: array
          items: { $ref: "#/components/schemas/ClipTraffic" }
    MyClip:
      type: object
      required: [id, caption, status, views, likes, createdAt]
      properties:
        id: { type: string }
        caption: { type: string }
        status: { type: string, enum: [published, processing] }
        views: { type: integer }
        likes: { type: integer }
        createdAt: { type: string, format: date-time }
    CreditPack:
      type: object
      required: [id, credits, price, badge]
      properties:
        id: { type: string }
        credits: { type: integer }
        price: { $ref: "#/components/schemas/Money" }
        badge: { type: string, nullable: true }
    TopUpIntent:
      type: object
      required: [reference, accessCode, price]
      properties:
        reference: { type: string }
        accessCode: { type: string, description: Paystack access code for the inline popup }
        price: { $ref: "#/components/schemas/Money" }
    TopUpStatus:
      type: object
      required: [reference, status, wallet]
      properties:
        reference: { type: string }
        status: { type: string, enum: [pending, success, failed] }
        wallet:
          oneOf:
            - { $ref: "#/components/schemas/Wallet" }
            - { type: "null" }
    Comment:
      type: object
      required: [id, author, body, createdAt, likeCount]
      properties:
        id: { type: string }
        author:
          type: object
          required: [handle, displayName, verified]
          properties:
            handle: { type: string }
            displayName: { type: string }
            verified: { type: boolean }
        body: { type: string }
        createdAt: { type: string, format: date-time }
        likeCount: { type: integer }
    CommentPage:
      type: object
      required: [items, nextCursor, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Comment" }
        nextCursor: { type: string, nullable: true }
        total: { type: integer }
    Me:
      type: object
      required: [handle, displayName, bio, campus, avatarUrl, verified]
      properties:
        handle: { type: string }
        displayName: { type: string }
        bio: { type: string }
        campus: { type: string, nullable: true }
        avatarUrl: { type: string, format: uri, nullable: true }
        verified: { type: boolean }
    Profile:
      type: object
      required: [creator, bio, followerCount, followingCount, totalLikes, clips]
      properties:
        creator: { $ref: "#/components/schemas/Creator" }
        bio: { type: string }
        followerCount: { type: integer }
        followingCount: { type: integer }
        totalLikes: { type: integer }
        clips:
          type: array
          items:
            type: object
            required: [id, posterUrl, plays, battleId]
            properties:
              id: { type: string }
              posterUrl: { type: string, format: uri }
              plays: { type: integer }
              battleId: { type: string, nullable: true }
