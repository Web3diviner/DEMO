openapi: 3.1.0
info:
  title: DEMO API
  version: 0.1.0
  description: >
    Contract-first source of truth for the DEMO client. The frontend's typed client and Zod
    validators in `lib/api` mirror these schemas 1:1; once a backend publishes this spec, the
    TypeScript types are generated from it in CI. Money is always integer minor units. Video never
    transits this API — uploads use signed tus tickets, playback uses signed expiring HLS URLs.
servers:
  - url: https://api.demo.example
paths:
  /v1/feed:
    get:
      summary: Personalized talent feed (cursor-paginated). For You vs Following (PRD §6.1)
      parameters:
        - name: cursor
          in: query
          required: false
          schema: { type: string, nullable: true }
        - name: feed
          in: query
          required: false
          schema: { type: string, enum: [fyp, following], default: fyp }
      responses:
        "200":
          description: A page of clips
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeedPage" }
  /v1/engagement:
    post:
      summary: Commit a single engagement action (like/follow/comment)
      description: Idempotent via the Idempotency-Key header; safe to retry from the offline queue.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EngagementAction" }
      responses:
        "200":
          description: Server-confirmed engagement result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EngagementResult" }
  /v1/uploads/ticket:
    post:
      summary: Issue a short-lived signed tus ticket for direct-to-storage video upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sizeBytes, mimeType]
              properties:
                sizeBytes: { type: integer }
                mimeType: { type: string }
      responses:
        "200":
          description: Signed upload ticket
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadTicket" }
  /v1/clips:
    post:
      summary: Publish clip metadata + claim an uploaded asset
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assetId, caption]
              properties:
                assetId: { type: string }
                caption: { type: string }
      responses:
        "200":
          description: Publish accepted (asset transcoding to HLS)
          content:
            application/json:
              schema:
                type: object
                required: [clipId, status]
                properties:
                  clipId: { type: string }
                  status: { type: string, enum: [processing, published] }
  /v1/profiles/{handle}:
    get:
      summary: Creator profile / Talent Hub
      parameters:
        - name: handle
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
  /v1/wallet:
    get:
      summary: Fan Credits + creator earnings (server-truth balances)
      responses:
        "200":
          description: Wallet balances
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Wallet" }
  /v1/credits/packs:
    get:
      summary: Purchasable Credit packs (server-quoted prices)
      responses:
        "200":
          description: Packs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CreditPack" }
  /v1/credits/topup:
    post:
      summary: Create a top-up intent; returns a Paystack reference for the inline popup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [packId]
              properties:
                packId: { type: string }
      responses:
        "200":
          description: Top-up intent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TopUpIntent" }
  /v1/credits/topup/{reference}:
    get:
      summary: Top-up status — `success` is set from the Paystack WEBHOOK, never the client
      parameters:
        - name: reference
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Status (poll until non-pending)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TopUpStatus" }
  /v1/clips/{clipId}/comments:
    get:
      summary: Comments for a clip (cursor-paginated)
      parameters:
        - name: clipId
          in: path
          required: true
          schema: { type: string }
        - name: cursor
          in: query
          required: false
          schema: { type: string, nullable: true }
      responses:
        "200":
          description: A page of comments
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommentPage" }
  /v1/battles:
    get:
      summary: Battles, optionally filtered by state (PRD §6.5)
      parameters:
        - name: state
          in: query
          required: false
          schema: { type: string, enum: [draft, open, voting, settled, archived] }
      responses:
        "200":
          description: Battles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Battle" }
  /v1/battles/{id}:
    get:
      summary: A single battle
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Battle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Battle" }
  /v1/battles/{id}/vote:
    post:
      summary: Cast one Credit-funded, weight-adjusted vote (vote cost → escrow + platform fee)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contestantId]
              properties:
                contestantId: { type: string }
      responses:
        "200":
          description: Updated battle + server-truth wallet after the spend
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VoteResult" }
  /v1/clips/{clipId}/tip:
    post:
      summary: One-tap tip (PRD §6.1/§7.2) — Credits → platform fee + creator earnings
      parameters:
        - name: clipId
          in: path
          required: true
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credits]
              properties:
                credits: { type: integer, description: Credits to send }
      responses:
        "200":
          description: Confirmed wallet after the spend
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TipResult" }
  /v1/search:
    get:
      summary: Search creators, hashtags, and clips (PRD §6.1)
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Grouped results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchResult" }
  /v1/trends:
    get:
      summary: Trending hashtags
      responses:
        "200":
          description: Trending hashtags
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Hashtag" }
  /v1/moderation/queue:
    get:
      summary: Staff review queue (PRD §10.3) — automated flags + user reports
      responses:
        "200":
          description: Items awaiting review
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ModerationItem" }
  /v1/moderation/{id}/action:
    post:
      summary: Resolve a queue item (logged + re-checked server-side)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [approve, remove, ban, escalate] }
      responses:
        "200":
          description: Resolution
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: { type: string }
                  status: { type: string, enum: [approved, removed, banned, escalated] }
  /v1/dms:
    get:
      summary: Direct-message threads for the signed-in user (PRD §11)
      responses:
        "200":
          description: Threads
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DmThread" }
  /v1/dms/{id}:
    get:
      summary: A single thread with its messages
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Thread detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DmThreadDetail" }
  /v1/dms/{id}/messages:
    post:
      summary: Send a message in a thread (idempotent via localId)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body, localId]
              properties:
                body: { type: string }
                localId: { type: string }
      responses:
        "200":
          description: The created message
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DmMessage" }
  /v1/charts/{board}:
    get:
      summary: Leaderboard for a board (PRD §6.4); Rising ranks growth velocity
      parameters:
        - name: board
          in: path
          required: true
          schema: { type: string, enum: [campus, state, national, genre, rising] }
        - name: scope
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Chart
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Chart" }
components:
  schemas:
    Money:
      type: object
      required: [currency, minor]
      properties:
        currency: { type: string, enum: [CREDITS, NGN, USD] }
        minor: { type: integer, description: Amount in minor units (kobo/cents/whole Credits) }
    Creator:
      type: object
      required: [id, handle, displayName, avatarUrl, verified, campus]
      properties:
        id: { type: string }
        handle: { type: string }
        displayName: { type: string }
        avatarUrl: { type: string, format: uri, nullable: true }
        verified: { type: boolean, description: Server-truth verification entitlement }
        campus: { type: string, nullable: true }
    Clip:
      type: object
      required:
        [
          id,
          creator,
          caption,
          hlsUrl,
          posterUrl,
          durationSec,
          width,
          height,
          stats,
          viewer,
          battleId,
        ]
      properties:
        id: { type: string }
        creator: { $ref: "#/components/schemas/Creator" }
        caption: { type: string }
        hlsUrl: { type: string, format: uri, description: Signed, expiring master HLS playlist }
        posterUrl: { type: string, format: uri }
        durationSec: { type: number }
        width: { type: integer }
        height: { type: integer }
        stats:
          type: object
          required: [likes, comments, shares, plays]
          properties:
            likes: { type: integer }
            comments: { type: integer }
            shares: { type: integer }
            plays: { type: integer }
        viewer:
          type: object
          required: [liked, following]
          properties:
            liked: { type: boolean }
            following: { type: boolean }
        battleId: { type: string, nullable: true }
    FeedPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Clip" }
        nextCursor: { type: string, nullable: true }
    EngagementAction:
      oneOf:
        - type: object
          required: [kind, clipId, value]
          properties:
            kind: { type: string, enum: [like] }
            clipId: { type: string }
            value: { type: boolean }
        - type: object
          required: [kind, creatorId, value]
          properties:
            kind: { type: string, enum: [follow] }
            creatorId: { type: string }
            value: { type: boolean }
        - type: object
          required: [kind, clipId, body, localId]
          properties:
            kind: { type: string, enum: [comment] }
            clipId: { type: string }
            body: { type: string }
            localId: { type: string }
    EngagementResult:
      type: object
      required: [clipId, liked, likeCount]
      properties:
        clipId: { type: string }
        liked: { type: boolean }
        likeCount: { type: integer }
    UploadTicket:
      type: object
      required: [endpoint, assetId, headers, expiresAt]
      properties:
        endpoint:
          { type: string, format: uri, description: tus creation endpoint at the storage provider }
        assetId: { type: string }
        headers:
          type: object
          additionalProperties: { type: string }
        expiresAt: { type: string, format: date-time }
    Wallet:
      type: object
      required: [credits, earnings]
      properties:
        credits: { $ref: "#/components/schemas/Money" }
        earnings: { $ref: "#/components/schemas/Money" }
    BattleContestant:
      type: object
      required: [id, creator, posterUrl, votes]
      properties:
        id: { type: string }
        creator: { $ref: "#/components/schemas/Creator" }
        posterUrl: { type: string, format: uri }
        votes: { type: integer, description: Weighted vote tally }
    Battle:
      type: object
      required:
        [
          id,
          format,
          title,
          state,
          endsAt,
          voteCost,
          prizePool,
          contestants,
          winnerContestantId,
          viewer,
        ]
      properties:
        id: { type: string }
        format: { type: string, enum: [rap, gospel, beat, choir, songwriting] }
        title: { type: string }
        state: { type: string, enum: [draft, open, voting, settled, archived] }
        endsAt: { type: string, format: date-time, nullable: true }
        voteCost: { $ref: "#/components/schemas/Money" }
        prizePool: { $ref: "#/components/schemas/Money" }
        contestants:
          type: array
          items: { $ref: "#/components/schemas/BattleContestant" }
        winnerContestantId: { type: string, nullable: true }
        viewer:
          type: object
          required: [votedContestantId, voteWeight]
          properties:
            votedContestantId: { type: string, nullable: true }
            voteWeight: { type: integer }
    VoteResult:
      type: object
      required: [battle, wallet]
      properties:
        battle: { $ref: "#/components/schemas/Battle" }
        wallet: { $ref: "#/components/schemas/Wallet" }
    TipResult:
      type: object
      required: [clipId, creditsSpent, wallet]
      properties:
        clipId: { type: string }
        creditsSpent: { $ref: "#/components/schemas/Money" }
        wallet: { $ref: "#/components/schemas/Wallet" }
    DmParticipant:
      type: object
      required: [handle, displayName, verified, avatarUrl]
      properties:
        handle: { type: string }
        displayName: { type: string }
        verified: { type: boolean }
        avatarUrl: { type: string, format: uri, nullable: true }
    DmMessage:
      type: object
      required: [id, fromMe, body, createdAt]
      properties:
        id: { type: string }
        fromMe: { type: boolean }
        body: { type: string }
        createdAt: { type: string, format: date-time }
    DmThread:
      type: object
      required: [id, participant, lastMessage, lastAt, unread]
      properties:
        id: { type: string }
        participant: { $ref: "#/components/schemas/DmParticipant" }
        lastMessage: { type: string }
        lastAt: { type: string, format: date-time }
        unread: { type: integer }
    DmThreadDetail:
      type: object
      required: [id, participant, messages]
      properties:
        id: { type: string }
        participant: { $ref: "#/components/schemas/DmParticipant" }
        messages:
          type: array
          items: { $ref: "#/components/schemas/DmMessage" }
    Hashtag:
      type: object
      required: [tag, posts]
      properties:
        tag: { type: string }
        posts: { type: integer }
    SearchResult:
      type: object
      required: [creators, hashtags, clips]
      properties:
        creators:
          type: array
          items: { $ref: "#/components/schemas/Creator" }
        hashtags:
          type: array
          items: { $ref: "#/components/schemas/Hashtag" }
        clips:
          type: array
          items:
            type: object
            required: [id, posterUrl, plays]
            properties:
              id: { type: string }
              posterUrl: { type: string, format: uri }
              plays: { type: integer }
    ModerationItem:
      type: object
      required:
        [id, kind, source, reason, severity, confidence, subject, preview, reportCount, createdAt]
      properties:
        id: { type: string }
        kind: { type: string, enum: [clip, comment, user] }
        source: { type: string, enum: [ai, report] }
        reason: { type: string }
        severity: { type: string, enum: [low, medium, high] }
        confidence: { type: number, nullable: true, description: AI confidence 0..1 }
        subject:
          type: object
          required: [handle, displayName]
          properties:
            handle: { type: string }
            displayName: { type: string }
        preview:
          type: object
          required: [posterUrl, text]
          properties:
            posterUrl: { type: string, format: uri, nullable: true }
            text: { type: string, nullable: true }
        reportCount: { type: integer }
        createdAt: { type: string, format: date-time }
    ChartEntry:
      type: object
      required: [rank, delta, creator, score, risingPct]
      properties:
        rank: { type: integer }
        delta: { type: integer, description: Rank change since last rollup }
        creator: { $ref: "#/components/schemas/Creator" }
        score: { type: number }
        risingPct: { type: number, nullable: true }
    Chart:
      type: object
      required: [board, scope, periodLabel, entries]
      properties:
        board: { type: string, enum: [campus, state, national, genre, rising] }
        scope: { type: string, nullable: true }
        periodLabel: { type: string }
        entries:
          type: array
          items: { $ref: "#/components/schemas/ChartEntry" }
    CreditPack:
      type: object
      required: [id, credits, price, badge]
      properties:
        id: { type: string }
        credits: { type: integer }
        price: { $ref: "#/components/schemas/Money" }
        badge: { type: string, nullable: true }
    TopUpIntent:
      type: object
      required: [reference, accessCode, price]
      properties:
        reference: { type: string }
        accessCode: { type: string, description: Paystack access code for the inline popup }
        price: { $ref: "#/components/schemas/Money" }
    TopUpStatus:
      type: object
      required: [reference, status, wallet]
      properties:
        reference: { type: string }
        status: { type: string, enum: [pending, success, failed] }
        wallet:
          oneOf:
            - { $ref: "#/components/schemas/Wallet" }
            - { type: "null" }
    Comment:
      type: object
      required: [id, author, body, createdAt, likeCount]
      properties:
        id: { type: string }
        author:
          type: object
          required: [handle, displayName, verified]
          properties:
            handle: { type: string }
            displayName: { type: string }
            verified: { type: boolean }
        body: { type: string }
        createdAt: { type: string, format: date-time }
        likeCount: { type: integer }
    CommentPage:
      type: object
      required: [items, nextCursor, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Comment" }
        nextCursor: { type: string, nullable: true }
        total: { type: integer }
    Profile:
      type: object
      required: [creator, bio, followerCount, followingCount, totalLikes, clips]
      properties:
        creator: { $ref: "#/components/schemas/Creator" }
        bio: { type: string }
        followerCount: { type: integer }
        followingCount: { type: integer }
        totalLikes: { type: integer }
        clips:
          type: array
          items:
            type: object
            required: [id, posterUrl, plays, battleId]
            properties:
              id: { type: string }
              posterUrl: { type: string, format: uri }
              plays: { type: integer }
              battleId: { type: string, nullable: true }
